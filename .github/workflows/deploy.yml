name: Crescent change api

"on":
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
jobs:
    # PRE BUILD:  Test Build before build inside actual machine
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7
            - name: Setup Node JS
              uses: actions/setup-node@v6
              with:
                  node-version: "24.16.0"
            - name: Install Dependencies
              run: npm install  --frozen-lockfile
            - name: Build Now
              run: npm run build
    # BUILD: Now Connect with SSH AND Build inside machain
    deploy:
        runs-on: ubuntu-latest
        needs: build-and-deploy
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7
            - name: Setup Node JS
              uses: actions/setup-node@v6
              with:
                  node-version: "24.16.0"
            - name: Install Dependencies
              run: npm install  --frozen-lockfile

            - name: Deploy to server via SSH
              uses: appleboy/ssh-action@v1
              env:
                  SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                  EC2_USER: ${{ secrets.EC2_USER }}
                  EC2_HOST: ${{ secrets.EC2_HOST }}
                  ENV_FILE: ${{ secrets.ENV_FILE }}
              with:
                  host: $SSH_PRIVATE_KEY
                  username: $EC2_USER
                  key: $EC2_HOST
                  scripts: |
                    cd ~/crecent-change-apis
                    


             
